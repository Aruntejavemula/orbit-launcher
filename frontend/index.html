<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6B8F71" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Remio" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Remio — track, manage, and launch all your subscriptions and tools in one place." />
    <title>Remio — your tool ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <div id="error-log" style="display:none;position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow:auto;background:#1a1a2e;color:#ff6b6b;font-family:monospace;font-size:12px;padding:12px;z-index:99999;white-space:pre-wrap;"></div>
    <script>
      // Global error catcher — logs all JS errors to a visible panel
      var errorLog = document.getElementById('error-log');
      function logError(msg) {
        errorLog.style.display = 'block';
        errorLog.textContent += new Date().toISOString() + ': ' + msg + '\n\n';
      }
      window.onerror = function(msg, src, line, col, err) {
        logError('ERROR: ' + msg + ' at ' + src + ':' + line + ':' + col + (err && err.stack ? '\n' + err.stack : ''));
      };
      window.onunhandledrejection = function(e) {
        var reason = e.reason;
        logError('UNHANDLED PROMISE: ' + (reason && reason.stack ? reason.stack : String(reason)));
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
