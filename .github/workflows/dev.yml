name: Dev CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  ci-1-test:
    name: CI 1 — Test & web build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend (PWA / web)
        run: npm run build
        working-directory: frontend

      - name: Run Frontend tests
        run: npm run test -- --coverage
        working-directory: frontend

      - name: Fix frontend lcov paths for Sonar
        run: sed -i 's|^SF:|SF:frontend/|' frontend/coverage/lcov.info

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run backend tests
        run: pytest --cov=. --cov-report=xml
        working-directory: backend

      - name: Copy and fix backend coverage paths for Sonar
        run: |
          cp backend/coverage.xml coverage.xml
          sed -i 's|filename="|filename="backend/|g' coverage.xml
          sed -i 's|<source>.*/backend</source>|<source>.</source>|' coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Cleanup
        if: always()
        run: sudo rm -rf .scannerwork

  ci-2-desktop-pack:
    name: CI 2 — Desktop pack (${{ matrix.platform }})
    needs: ci-1-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            pack_flag: --win
          - os: macos-latest
            platform: macos
            pack_flag: --mac
          - os: ubuntu-latest
            platform: linux
            pack_flag: --linux

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build desktop UI
        run: npm run electron:build:ui

      - name: Setup .NET SDK
        if: matrix.platform == 'windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Microsoft Store update helper
        if: matrix.platform == 'windows'
        run: npm run electron:build:store:helper

      - name: Pack desktop app
        run: npx electron-builder --config electron-builder.ci.config.cjs ${{ matrix.pack_flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ""
          WIN_CSC_KEY_PASSWORD: ""

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: remio-desktop-${{ matrix.platform }}
          path: frontend/release-ci/
          if-no-files-found: error
          retention-days: 14
