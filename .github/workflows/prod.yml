name: Production Pipeline

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for running production pipeline"
        required: true
        type: string
      confirmation:
        description: "Type DEPLOY to confirm"
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Verify deployment confirmation
        if: ${{ github.event.inputs.confirmation != 'DEPLOY' }}
        run: |
          echo "ERROR: Confirmation must be exactly 'DEPLOY'. Got: '${{ github.event.inputs.confirmation }}'"
          exit 1

      - name: Checkout qa branch
        uses: actions/checkout@v4
        with:
          ref: qa

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run backend tests
        run: pytest
        working-directory: backend

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Checkout code 
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
