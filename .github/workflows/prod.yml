name: Production Pipeline

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for running production pipeline"
        required: true
        type: string
      confirmation:
        description: "Type DEPLOY to confirm"
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Verify deployment confirmation
        if: ${{ github.event.inputs.confirmation != 'DEPLOY' }}
        run: |
          echo "ERROR: Confirmation must be exactly 'DEPLOY'. Got: '${{ github.event.inputs.confirmation }}'"
          exit 1

      - name: Checkout qa branch
        uses: actions/checkout@v4
        with:
          ref: qa

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run backend tests
        run: pytest
        working-directory: backend

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Checkout code 
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  build-android-release:
    name: Build Android Release AAB
    needs: build-and-test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout qa branch
        uses: actions/checkout@v4
        with:
          ref: qa

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Capacitor web assets
        run: npm run cap:build

      - name: Sync Android project
        run: npx cap sync android

      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json
        working-directory: frontend/android

      - name: Write keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > remio-upload.jks
        working-directory: frontend/android

      - name: Write keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=${{ github.workspace }}/frontend/android/remio-upload.jks
          storePassword=${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          keyAlias=remio
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
        working-directory: frontend/android

      - name: Set versionCode
        run: sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" app/build.gradle
        working-directory: frontend/android

      - name: Build release AAB
        run: ./gradlew bundleRelease
        working-directory: frontend/android

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: remio-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
